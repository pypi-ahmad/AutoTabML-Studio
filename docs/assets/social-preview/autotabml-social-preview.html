<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoTabML Studio Social Preview</title>
  <style>
    :root {
      --ink: #1c2a44;
      --muted: #5f6c86;
      --card: rgba(255, 255, 255, 0.72);
      --line: rgba(28, 42, 68, 0.14);
      --accent: #d96a2b;
      --bg-a: #f7f1e7;
      --bg-b: #e2eef6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 1280px;
      height: 640px;
      overflow: hidden;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(217, 106, 43, 0.18), transparent 28%),
        radial-gradient(circle at right 20%, rgba(76, 146, 197, 0.20), transparent 26%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 34px 40px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 28px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      color: var(--muted);
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(217, 106, 43, 0.12);
    }

    h1 {
      margin: 18px 0 12px;
      font-size: 70px;
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      max-width: 360px;
      font-size: 28px;
      line-height: 1.18;
      color: var(--muted);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 18px;
      color: var(--ink);
    }

    .gallery {
      display: grid;
      grid-template-columns: 1.18fr 0.82fr;
      grid-template-rows: 1fr 1fr;
      gap: 18px;
      align-content: stretch;
    }

    .panel {
      position: relative;
      min-height: 0;
      height: 100%;
      border-radius: 26px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 18px 36px rgba(28, 42, 68, 0.12);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      transform: scale(1.02);
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 42%;
      background: linear-gradient(180deg, transparent, rgba(20, 27, 42, 0.78));
    }

    .panel.dashboard::before {
      background-image: url('../screenshots/dashboard-overview.png');
      background-position: 44% 0%;
    }

    .panel.prediction::before {
      background-image: url('../screenshots/prediction-center.png');
      background-position: 55% 0%;
    }

    .panel.registry::before {
      background-image: url('../screenshots/registry-view.png');
      background-position: 58% 0%;
    }

    .panel.dashboard {
      grid-row: 1 / span 2;
    }

    .label {
      position: absolute;
      left: 18px;
      bottom: 16px;
      z-index: 1;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: #ffffff;
      font-size: 18px;
      backdrop-filter: blur(8px);
    }

    .corner {
      position: absolute;
      right: 28px;
      bottom: 22px;
      color: rgba(28, 42, 68, 0.62);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="hero">
      <div>
        <div class="eyebrow"><span class="dot"></span> Portfolio-ready local ML tooling</div>
        <h1>AutoTabML<br>Studio</h1>
        <p class="subtitle">Local-first tabular ML workbench with Streamlit UI, CLI workflows, and MLflow-backed history.</p>
      </div>
      <div class="pill-row">
        <div class="pill">Validation</div>
        <div class="pill">Profiling</div>
        <div class="pill">Benchmarking</div>
        <div class="pill">Prediction</div>
        <div class="pill">Registry</div>
      </div>
    </section>
    <section class="gallery">
      <article class="panel dashboard"><div class="label">Dashboard</div></article>
      <article class="panel prediction"><div class="label">Prediction Center</div></article>
      <article class="panel registry"><div class="label">Model Registry</div></article>
    </section>
    <div class="corner">Local-first tabular ML workbench</div>
  </main>
</body>
</html>
