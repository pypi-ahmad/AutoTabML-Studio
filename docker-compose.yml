# AutoTabML Studio — local development stack.
#
# Use:
#   docker compose build
#   docker compose up -d autotabml      # detached
#   docker compose logs -f autotabml   # follow logs
#   docker compose exec autotabml autotabml --version
#   docker compose down
#
# The mlflow sidecar is a SQLite-backed local tracking server. It is
# optional — set AUTOTABML_MLFLOW__TRACKING_URI in the autotabml
# service to use it.

services:
  autotabml:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12.10"
    image: autotabml-studio:0.2.0
    container_name: autotabml-studio
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      AUTOTABML_LOG_FORMAT: json
      AUTOTABML_LOG_LEVEL: INFO
      # Uncomment to point at the local mlflow sidecar below.
      # AUTOTABML_MLFLOW__TRACKING_URI: http://mlflow:5000
      # AUTOTABML_MLFLOW__REGISTRY_URI: http://mlflow:5000
    volumes:
      - autotabml-artifacts:/app/artifacts
      - autotabml-mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional local MLflow tracking server. Uncomment to enable.
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:v2.22.0
  #   container_name: autotabml-mlflow
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
  #   command:
  #     - mlflow
  #     - server
  #     - --host=0.0.0.0
  #     - --port=5000
  #     - --backend-store-uri=sqlite:///mlflow.db
  #   volumes:
  #     - autotabml-mlflow-data:/mlflow

volumes:
  autotabml-artifacts:
  autotabml-mlruns:
  # autotabml-mlflow-data:
