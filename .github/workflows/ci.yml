name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run optional heavy-dependency integration tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install 'ruff>=0.15,<1'

      - name: Auto-fix and lint
        run: |
          ruff check app/ tests/ scripts/ --fix --quiet
          ruff check app/ tests/ scripts/ --output-format=full

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,validation,profiling,benchmark,uci]"

      - name: Run unit test suite
        run: python -m pytest tests/ -q --tb=short

      - name: Diagnose collection errors
        if: failure()
        run: |
          python -m pytest tests/ --collect-only --tb=short 2>&1 | grep -E 'ERROR|Error|error|ModuleNotFound|ImportError|cannot import' | head -20 | while IFS= read -r line; do echo "::warning::$line"; done || true
          python -c "import app; print('app importable')" 2>&1 | while IFS= read -r line; do echo "::warning::APP_IMPORT: $line"; done || true
          python -c "from app.modeling.benchmark.schemas import BenchmarkConfig; print('benchmark.schemas OK')" 2>&1 | while IFS= read -r line; do echo "::warning::BENCH: $line"; done || true
          python -c "from app.validation.rules import run_app_rules; print('validation.rules OK')" 2>&1 | while IFS= read -r line; do echo "::warning::VALID: $line"; done || true
          pip list --format=freeze 2>&1 | grep -iE 'great.expect|ydata|lazy|pycaret|mlflow|uci|sklearn|scikit' | while IFS= read -r line; do echo "::warning::PKG: $line"; done || true

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,validation,profiling,benchmark,uci]"

      - name: Run coverage gate
        run: python -m pytest tests/ --cov=app --cov-report=term --cov-report=xml:coverage.xml --cov-fail-under=65 -q

      - name: Diagnose coverage errors
        if: failure()
        run: |
          python -m pytest tests/ --collect-only --tb=short 2>&1 | grep -E 'ERROR|Error|error|ModuleNotFound|ImportError|cannot import' | head -20 | while IFS= read -r line; do echo "::warning::COV_DIAG: $line"; done || true

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml

  e2e-smoke:
    name: E2E Smoke (real deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,validation,profiling,benchmark,uci]"

      - name: Run e2e smoke test with real dependencies
        run: python -m pytest tests/test_e2e_local_smoke.py -v --tb=short

      - name: Diagnose e2e errors
        if: failure()
        run: |
          python -m pytest tests/test_e2e_local_smoke.py --collect-only --tb=short 2>&1 | grep -E 'ERROR|Error|error|ModuleNotFound|ImportError|cannot import' | head -10 | while IFS= read -r line; do echo "::warning::E2E_DIAG: $line"; done || true

  integration-tests:
    name: Optional Integration Tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install heavy optional dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,validation,profiling,benchmark,experiment,uci]"

      - name: Run integration-marked tests
        shell: bash
        run: |
          set +e
          pytest tests/ -m integration -q --tb=short
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "No integration-marked tests were collected."
            exit 0
          fi
          exit "$code"
