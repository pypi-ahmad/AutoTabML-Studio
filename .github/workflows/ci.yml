name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run optional heavy-dependency integration tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force uv to use the interpreter provisioned by actions/setup-python
  # rather than downloading its own / honoring .python-version (3.12).
  UV_PYTHON_PREFERENCE: only-system
  UV_PYTHON_DOWNLOADS: never

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install 'ruff>=0.15,<1'

      - name: Auto-fix and lint
        run: |
          ruff check app/ tests/ scripts/ --fix --quiet || true
          ruff check app/ tests/ scripts/ --output-format=full

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install dependencies (locked)
        run: uv sync --locked --extra dev --extra validation --extra profiling --extra benchmark --extra uci --extra flaml

      - name: Run unit test suite
        run: uv run --no-sync python -m pytest tests/ -q --tb=short

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install dependencies (locked)
        run: uv sync --locked --extra dev --extra validation --extra profiling --extra benchmark --extra uci --extra flaml

      - name: Run coverage gate
        run: uv run --no-sync python -m pytest tests/ --cov=app --cov-report=term --cov-report=xml:coverage.xml --cov-fail-under=65 -q

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml

  e2e-smoke:
    name: E2E Smoke (real deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install dependencies (locked)
        run: uv sync --locked --extra dev --extra validation --extra profiling --extra benchmark --extra uci --extra flaml

      - name: Run e2e smoke test with real dependencies
        run: uv run --no-sync python -m pytest tests/test_e2e_local_smoke.py -v --tb=short

  integration-tests:
    name: Optional Integration Tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install heavy optional dependencies (locked)
        run: uv sync --locked --extra dev --extra validation --extra profiling --extra benchmark --extra experiment --extra uci

      - name: Run integration-marked tests
        shell: bash
        run: |
          set +e
          uv run --no-sync pytest tests/ -m integration -q --tb=short
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "No integration-marked tests were collected."
            exit 0
          fi
          exit "$code"
