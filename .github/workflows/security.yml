name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Run detect-secrets scan
        shell: bash
        run: |
          EXCLUDE_REGEX='(^tests[/\\]|^docs[/\\]|^README\.md$|^\.env\.example$|^app[/\\]security[/\\]masking\.py$|^\.venv[/\\]|^artifacts[/\\]|^dist[/\\]|^mlruns[/\\]|^\.pytest_cache[/\\]|^autotabml_studio\.egg-info[/\\]|^detect-secrets-report\.json$|^coverage\.xml$|^\.coverage$)'
          detect-secrets scan --all-files --exclude-files "$EXCLUDE_REGEX" > detect-secrets-report.json
          python - <<'PY'
          import json
          import sys

          with open('detect-secrets-report.json', encoding='utf-8') as handle:
              report = json.load(handle)

          results = report.get('results', {})
          findings = sum(len(items) for items in results.values())
          if findings:
              print('detect-secrets findings:')
              for path, items in sorted(results.items()):
                  print(f' - {path}: {len(items)} finding(s)')
              sys.exit(1)

          print('No detect-secrets findings.')
          PY

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          version='8.24.2'
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact