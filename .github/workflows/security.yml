name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Run detect-secrets scan
        shell: bash
        run: |
          EXCLUDE_REGEX='(^tests/|^docs/|^datasets/|^README\.md$|^\.env\.example$|^app/security/masking\.py$|\.png$|\.html$)'
          echo "::group::Tracked files to scan"
          git ls-files | grep -Ev "$EXCLUDE_REGEX" | head -200
          echo "::endgroup::"
          detect-secrets scan --exclude-files "$EXCLUDE_REGEX" > detect-secrets-report.json
          python - <<'PY'
          import json, os, sys

          with open('detect-secrets-report.json', encoding='utf-8') as fh:
              report = json.load(fh)

          results = report.get('results', {})
          total = sum(len(v) for v in results.values())

          summary = os.environ.get('GITHUB_STEP_SUMMARY', '')

          lines = []
          if total:
              lines.append('## detect-secrets findings\n')
              lines.append(f'**{total}** potential secret(s) in **{len([v for v in results.values() if v])}** file(s).\n')
              lines.append('| File | Line | Type | Hashed Secret |')
              lines.append('|------|------|------|---------------|')
              for path, items in sorted(results.items()):
                  for item in items:
                      lines.append(
                          f'| `{path}` | {item.get("line_number", "?")} '
                          f'| {item.get("type", "?")} '
                          f'| `{item.get("hashed_secret", "?")[:12]}…` |'
                      )
              detail = '\n'.join(lines)
              print(detail)
              if summary:
                  with open(summary, 'a') as sf:
                      sf.write(detail + '\n')
              sys.exit(1)

          msg = '## detect-secrets\n\nNo findings.'
          print('No detect-secrets findings.')
          if summary:
              with open(summary, 'a') as sf:
                  sf.write(msg + '\n')
          PY

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          version='8.24.2'
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact