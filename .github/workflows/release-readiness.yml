name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  UV_PYTHON_PREFERENCE: only-system
  UV_PYTHON_DOWNLOADS: never

jobs:
  public-release-check:
    name: Public Release Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.0.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install release tooling (locked)
        run: |
          uv sync --locked --group dev
          uv pip install twine build

      - name: Validate public release metadata
        run: uv run --no-sync python -m app.release_metadata

      - name: Build distribution artifacts
        run: uv run --no-sync python -m build

      - name: Validate built package metadata
        run: uv run --no-sync python -m twine check dist/*