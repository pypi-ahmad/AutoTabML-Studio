name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  UV_PYTHON_PREFERENCE: only-system
  UV_PYTHON_DOWNLOADS: never

jobs:
  public-release-check:
    name: Public Release Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install release tooling (locked)
        run: |
          uv sync --locked --extra dev
          uv pip install twine build

      - name: Validate public release metadata
        run: uv run --no-sync python -m app.release_metadata

      - name: Build distribution artifacts
        run: uv run --no-sync python -m build

      - name: Validate built package metadata
        run: uv run --no-sync python -m twine check dist/*