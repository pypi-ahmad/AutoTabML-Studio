name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please describe the problem you'd like solved and the solution you'd prefer.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What pain point does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative designs you've thought about.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - CLI
        - Streamlit UI
        - Python API
        - Documentation
        - CI / Tooling
