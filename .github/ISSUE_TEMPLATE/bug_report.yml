name: Bug Report
description: Report a bug in AutoTabML Studio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: AutoTabML Studio version
      description: "Run `autotabml info` or check `app/__init__.py`."
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.0"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - Streamlit UI
        - Python API
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or command(s) to trigger the issue.
      placeholder: |
        1. Run `autotabml validate ...`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant output (will be auto-formatted as code).
      render: text
